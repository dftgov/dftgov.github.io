
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap');

  :root {
    --gold: #C8A84B;
    --gold-light: #E8C96A;
    --gold-dark: #8B6914;
    --navy: #0D1B2A;
    --navy-mid: #1A2E45;
    --navy-light: #243B55;
    --sand: #F5DEB3;
    --sand-dark: #D4A96A;
    --accent: #4FC3F7;
    --danger: #EF5350;
    --success: #66BB6A;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body, #root {
    background: transparent;
    font-family: 'Rajdhani', sans-serif;
    color: var(--color-text-primary);
  }

  .dft-container {
    padding: 1.5rem 1rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
  }

  .dft-header {
    text-align: center;
    width: 100%;
  }

  .dft-title {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.35em;
    color: var(--color-text-secondary);
    text-transform: uppercase;
  }

  .dft-subtitle {
    font-family: 'Orbitron', monospace;
    font-size: 18px;
    font-weight: 900;
    letter-spacing: 0.1em;
    color: var(--gold);
    margin-top: 4px;
  }

  .dft-line {
    width: 120px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 8px auto 0;
  }

  .main-layout {
    display: flex;
    align-items: center;
    gap: 2.5rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  /* AMPULHETA SVG */
  .hourglass-wrap {
    position: relative;
    width: 160px;
    height: 220px;
    flex-shrink: 0;
  }

  #hourglass-svg {
    width: 160px;
    height: 220px;
    filter: drop-shadow(0 0 18px rgba(200, 168, 75, 0.35));
  }

  /* PAINEL DIREITO */
  .right-panel {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    min-width: 220px;
  }

  /* DISPLAY DE TEMPO */
  .time-display {
    background: var(--color-background-secondary);
    border: 1px solid var(--gold-dark);
    border-radius: 12px;
    padding: 1rem 1.5rem;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .time-display::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }

  .time-label {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--color-text-secondary);
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  #time-output {
    font-family: 'Orbitron', monospace;
    font-size: 42px;
    font-weight: 700;
    color: var(--gold);
    line-height: 1;
    transition: color 0.3s;
  }

  #time-output.danger { color: var(--danger); }
  #time-output.done { color: var(--success); }

  /* CONFIGURAÇÃO DE TEMPO */
  .config-section {
    background: var(--color-background-secondary);
    border: 0.5px solid var(--color-border-tertiary);
    border-radius: 10px;
    padding: 1rem;
  }

  .config-label {
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--color-text-secondary);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .time-inputs {
    display: flex;
    align-items: center;
    gap: 8px;
    justify-content: center;
  }

  .time-field {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .time-field span {
    font-size: 10px;
    color: var(--color-text-secondary);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .time-field input[type=number] {
    width: 60px;
    text-align: center;
    font-family: 'Orbitron', monospace;
    font-size: 20px;
    font-weight: 700;
    color: var(--gold);
    background: var(--color-background-primary);
    border: 1px solid var(--gold-dark);
    border-radius: 6px;
    padding: 6px 4px;
    outline: none;
    -moz-appearance: textfield;
  }

  .time-field input::-webkit-outer-spin-button,
  .time-field input::-webkit-inner-spin-button { -webkit-appearance: none; }

  .time-sep {
    font-family: 'Orbitron', monospace;
    font-size: 22px;
    font-weight: 700;
    color: var(--gold);
    padding-bottom: 16px;
  }

  /* PRESETS */
  .presets {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 8px;
  }

  .preset-btn {
    font-family: 'Rajdhani', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.05em;
    background: transparent;
    border: 0.5px solid var(--color-border-secondary);
    border-radius: 20px;
    padding: 3px 10px;
    cursor: pointer;
    color: var(--color-text-secondary);
    transition: all 0.2s;
  }

  .preset-btn:hover {
    border-color: var(--gold);
    color: var(--gold);
    background: rgba(200,168,75,0.08);
  }

  /* BOTÕES DE CONTROLE */
  .controls {
    display: flex;
    gap: 8px;
  }

  .btn-main {
    flex: 1;
    font-family: 'Orbitron', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 12px 8px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }

  #btn-start {
    background: linear-gradient(135deg, var(--gold-dark), var(--gold));
    color: #1a1000;
  }

  #btn-start:hover { filter: brightness(1.1); transform: translateY(-1px); }
  #btn-start:active { transform: scale(0.97); }

  #btn-reset {
    background: var(--color-background-secondary);
    border: 0.5px solid var(--color-border-secondary);
    color: var(--color-text-secondary);
    flex: 0 0 auto;
    width: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
  }

  #btn-reset:hover {
    border-color: var(--color-border-primary);
    color: var(--color-text-primary);
  }

  /* STATUS */
  .status-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 12px;
    border-radius: 20px;
    background: var(--color-background-secondary);
    border: 0.5px solid var(--color-border-tertiary);
    font-size: 12px;
    color: var(--color-text-secondary);
    letter-spacing: 0.05em;
    justify-content: center;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--color-text-secondary);
    transition: background 0.3s;
  }

  .status-dot.running { background: var(--success); animation: pulse-dot 1s ease-in-out infinite; }
  .status-dot.danger { background: var(--danger); animation: pulse-dot 0.5s ease-in-out infinite; }
  .status-dot.done { background: var(--gold); }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  /* Rotação da ampulheta */
  @keyframes flip-hg {
    0% { transform: rotate(0deg); }
    40% { transform: rotate(180deg); }
    100% { transform: rotate(180deg); }
  }

  .hourglass-flip {
    animation: flip-hg 1s ease-in-out forwards;
  }

  .hourglass-unflip {
    animation: flip-hg 1s ease-in-out reverse forwards;
  }

  /* Shake ao terminar */
  @keyframes shake {
    0%, 100% { transform: rotate(0deg); }
    20% { transform: rotate(-8deg); }
    40% { transform: rotate(8deg); }
    60% { transform: rotate(-5deg); }
    80% { transform: rotate(5deg); }
  }

  .hourglass-shake { animation: shake 0.6s ease-in-out; }
</style>

<div class="dft-container">

  <div class="dft-header">
    <div class="dft-title">Dimensionamento de Força de Trabalho</div>
    <div class="dft-subtitle">DFT TIMER</div>
    <div class="dft-line"></div>
  </div>

  <div class="main-layout">

    <!-- AMPULHETA -->
    <div class="hourglass-wrap">
      <svg id="hourglass-svg" viewBox="0 0 160 220" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="bodyGrad" x1="0" y1="0" x2="1" y2="0">
            <stop offset="0%" stop-color="#8B6914"/>
            <stop offset="40%" stop-color="#E8C96A"/>
            <stop offset="100%" stop-color="#8B6914"/>
          </linearGradient>
          <linearGradient id="glassGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#C8A84B" stop-opacity="0.15"/>
            <stop offset="100%" stop-color="#C8A84B" stop-opacity="0.05"/>
          </linearGradient>
          <clipPath id="topGlass">
            <polygon points="18,30 142,30 80,110"/>
          </clipPath>
          <clipPath id="botGlass">
            <polygon points="80,110 18,190 142,190"/>
          </clipPath>
          <filter id="glow">
            <feGaussianBlur stdDeviation="2" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>

        <!-- Moldura superior e inferior (decoração) -->
        <rect x="10" y="12" width="140" height="18" rx="5" fill="url(#bodyGrad)" stroke="#6B4F0A" stroke-width="0.5"/>
        <rect x="10" y="190" width="140" height="18" rx="5" fill="url(#bodyGrad)" stroke="#6B4F0A" stroke-width="0.5"/>

        <!-- Colunas laterais -->
        <rect x="10" y="18" width="10" height="184" rx="2" fill="url(#bodyGrad)" stroke="#6B4F0A" stroke-width="0.5"/>
        <rect x="140" y="18" width="10" height="184" rx="2" fill="url(#bodyGrad)" stroke="#6B4F0A" stroke-width="0.5"/>

        <!-- Corpo de vidro superior -->
        <polygon points="20,30 140,30 80,108" fill="url(#glassGrad)" stroke="#C8A84B" stroke-width="1.2" stroke-linejoin="round"/>
        <!-- Corpo de vidro inferior -->
        <polygon points="80,112 20,190 140,190" fill="url(#glassGrad)" stroke="#C8A84B" stroke-width="1.2" stroke-linejoin="round"/>

        <!-- Gargalo -->
        <ellipse cx="80" cy="110" rx="4" ry="3" fill="#C8A84B" opacity="0.6"/>

        <!-- Areia superior (dinâmica) -->
        <g clip-path="url(#topGlass)">
          <!-- Fundo da areia superior -->
          <polygon id="sand-top" points="20,30 140,30 80,108" fill="#D4A96A" opacity="0.85"/>
          <!-- Nível da areia (cortado pelo clip) -->
          <rect id="sand-top-mask" x="0" y="0" width="160" height="200" fill="#1A2E45" opacity="0"/>
        </g>

        <!-- Areia inferior (acumula) -->
        <g clip-path="url(#botGlass)">
          <polygon id="sand-bot" points="80,190 20,190 140,190" fill="#D4A96A" opacity="0.85"/>
        </g>

        <!-- Fluxo de areia pelo gargalo -->
        <g id="sand-flow" opacity="0">
          <line x1="80" y1="112" x2="80" y2="130" stroke="#E8C96A" stroke-width="2.5" stroke-linecap="round" opacity="0.8">
            <animate attributeName="stroke-dasharray" values="2,4;4,4;2,4" dur="0.4s" repeatCount="indefinite"/>
            <animate attributeName="y2" values="130;140;130" dur="0.6s" repeatCount="indefinite"/>
          </line>
          <line x1="78" y1="112" x2="77" y2="125" stroke="#C8A84B" stroke-width="1" stroke-linecap="round" opacity="0.5">
            <animate attributeName="stroke-dasharray" values="1,6;3,6;1,6" dur="0.5s" repeatCount="indefinite"/>
          </line>
          <line x1="82" y1="112" x2="83" y2="122" stroke="#C8A84B" stroke-width="1" stroke-linecap="round" opacity="0.5">
            <animate attributeName="stroke-dasharray" values="3,5;1,5;3,5" dur="0.45s" repeatCount="indefinite"/>
          </line>
        </g>

        <!-- Detalhes dourados superiores e inferiores -->
        <line x1="18" y1="21" x2="142" y2="21" stroke="#E8C96A" stroke-width="0.5" opacity="0.7"/>
        <line x1="18" y1="199" x2="142" y2="199" stroke="#E8C96A" stroke-width="0.5" opacity="0.7"/>
        <!-- Entalhe decorativo colunas -->
        <rect x="11" y="100" width="8" height="20" rx="1" fill="#C8A84B" opacity="0.4"/>
        <rect x="141" y="100" width="8" height="20" rx="1" fill="#C8A84B" opacity="0.4"/>

        <!-- Reflexo de vidro -->
        <polygon points="22,32 50,32 35,85" fill="white" opacity="0.06"/>
        <polygon points="110,32 138,32 122,85" fill="white" opacity="0.04"/>
      </svg>
    </div>

    <!-- PAINEL DIREITO -->
    <div class="right-panel">

      <!-- Display principal -->
      <div class="time-display">
        <div class="time-label">Tempo restante</div>
        <div id="time-output">00:00</div>
      </div>

      <!-- Configurar tempo -->
      <div class="config-section">
        <div class="config-label">Definir tempo</div>
        <div class="time-inputs">
          <div class="time-field">
            <input type="number" id="inp-min" value="5" min="0" max="99" placeholder="00"/>
            <span>min</span>
          </div>
          <div class="time-sep">:</div>
          <div class="time-field">
            <input type="number" id="inp-sec" value="0" min="0" max="59" placeholder="00"/>
            <span>seg</span>
          </div>
        </div>

        <div class="presets">
          <button class="preset-btn" data-min="1" data-sec="0">1 min</button>
          <button class="preset-btn" data-min="5" data-sec="0">5 min</button>
          <button class="preset-btn" data-min="10" data-sec="0">10 min</button>
          <button class="preset-btn" data-min="15" data-sec="0">15 min</button>
          <button class="preset-btn" data-min="30" data-sec="0">30 min</button>
          <button class="preset-btn" data-min="60" data-sec="0">1 hora</button>
        </div>
      </div>

      <!-- Controles -->
      <div class="controls">
        <button class="btn-main" id="btn-start">▶ Iniciar</button>
        <button class="btn-main" id="btn-reset" title="Reiniciar">↺</button>
      </div>

      <!-- Status -->
      <div class="status-bar">
        <div class="status-dot" id="status-dot"></div>
        <span id="status-text">Pronto para iniciar</span>
      </div>

    </div>
  </div>

</div>

<script>
  const timeOutput = document.getElementById('time-output');
  const btnStart = document.getElementById('btn-start');
  const btnReset = document.getElementById('btn-reset');
  const inpMin = document.getElementById('inp-min');
  const inpSec = document.getElementById('inp-sec');
  const statusDot = document.getElementById('status-dot');
  const statusText = document.getElementById('status-text');
  const sandFlow = document.getElementById('sand-flow');
  const sandTop = document.getElementById('sand-top');
  const sandBot = document.getElementById('sand-bot');
  const hgSvg = document.getElementById('hourglass-svg');

  let totalSeconds = 0;
  let remaining = 0;
  let timer = null;
  let running = false;
  let paused = false;

  // Pontos da ampulheta (vidro)
  // Topo: triangulo com apex em 108
  // Bot: triangulo com base no topo 112

  function pad(n) { return String(Math.floor(n)).padStart(2, '0'); }

  function formatTime(s) {
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return pad(m) + ':' + pad(sec);
  }

  function updateDisplay() {
    timeOutput.textContent = formatTime(remaining);
    if (remaining <= 10 && running) {
      timeOutput.className = 'danger';
    } else if (!running && remaining === 0 && totalSeconds > 0) {
      timeOutput.className = 'done';
    } else {
      timeOutput.className = '';
    }
  }

  function updateSand() {
    const ratio = totalSeconds > 0 ? remaining / totalSeconds : 1;
    // Areia superior: começa cheia, vai reduzindo
    // O triângulo vai de y=30 no topo até apex em y=108
    // Areia é representada como uma linha horizontal que desce
    const topH = 30; // topo
    const apex = 108; // gargalo
    const sandY = topH + (apex - topH) * (1 - ratio);
    // Redesenha o polígono da areia superior
    // Interseção da linha horizontal sandY com as arestas do triângulo
    // Aresta esquerda: de (20,30) a (80,108)
    // f(y) = 20 + (y-30)/(78) * 60
    const t = (sandY - 30) / 78;
    const lx = 20 + t * 60;
    const rx = 140 - t * 60;
    if (ratio > 0) {
      sandTop.setAttribute('points', `${lx},${sandY} ${rx},${sandY} 80,108`);
    } else {
      sandTop.setAttribute('points', '80,108 80,108 80,108');
    }

    // Areia inferior: começa vazia, vai enchendo
    // Triângulo inferior: apex em (80,112), base em y=190
    // Linha sobe de 190 até 112
    const botApex = 112;
    const botBase = 190;
    const botSandY = botBase - (botBase - botApex) * (1 - ratio);
    const bt = (botBase - botSandY) / (botBase - botApex);
    const blx = 20 + (1 - bt) * 60;
    const brx = 140 - (1 - bt) * 60;
    if (ratio < 1) {
      sandBot.setAttribute('points', `${blx},${botSandY} ${brx},${botSandY} 80,${botBase} 20,${botBase} 140,${botBase}`);
    } else {
      sandBot.setAttribute('points', '20,190 140,190 80,190');
    }

    // Cor da areia muda quando acaba
    if (remaining <= 10 && running && remaining > 0) {
      sandTop.style.fill = '#EF5350';
      sandBot.style.fill = '#EF5350';
    } else if (!running && remaining === 0 && totalSeconds > 0) {
      sandTop.style.fill = '#66BB6A';
      sandBot.style.fill = '#66BB6A';
    } else {
      sandTop.style.fill = '#D4A96A';
      sandBot.style.fill = '#D4A96A';
    }
  }

  function setStatus(state, msg) {
    statusDot.className = 'status-dot ' + state;
    statusText.textContent = msg;
  }

  function playAlarm() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const notes = [880, 1100, 880, 1100, 660];
      notes.forEach((freq, i) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain);
        gain.connect(ctx.destination);
        osc.type = 'sine';
        osc.frequency.value = freq;
        const t = ctx.currentTime + i * 0.22;
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(0.35, t + 0.04);
        gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
        osc.start(t);
        osc.stop(t + 0.22);
      });
    } catch(e) {}
  }

  function shakeHourglass() {
    hgSvg.classList.remove('hourglass-shake');
    void hgSvg.offsetWidth;
    hgSvg.classList.add('hourglass-shake');
    setTimeout(() => hgSvg.classList.remove('hourglass-shake'), 700);
  }

  function startTimer() {
    const mins = parseInt(inpMin.value) || 0;
    const secs = parseInt(inpSec.value) || 0;
    if (!paused) {
      totalSeconds = mins * 60 + secs;
      remaining = totalSeconds;
    }
    if (totalSeconds <= 0) return;

    running = true;
    paused = false;
    sandFlow.style.opacity = '1';
    btnStart.textContent = '⏸ Pausar';
    setStatus('running', 'Contagem em andamento...');
    updateDisplay();
    updateSand();

    timer = setInterval(() => {
      remaining--;
      updateDisplay();
      updateSand();
      if (remaining <= 0) {
        clearInterval(timer);
        running = false;
        sandFlow.style.opacity = '0';
        btnStart.textContent = '▶ Iniciar';
        setStatus('done', 'Tempo esgotado!');
        playAlarm();
        shakeHourglass();
        updateSand();
      }
    }, 1000);
  }

  function pauseTimer() {
    clearInterval(timer);
    running = false;
    paused = true;
    sandFlow.style.opacity = '0';
    btnStart.textContent = '▶ Continuar';
    setStatus('', 'Pausado');
  }

  function resetTimer() {
    clearInterval(timer);
    running = false;
    paused = false;
    remaining = 0;
    totalSeconds = 0;
    sandFlow.style.opacity = '0';
    btnStart.textContent = '▶ Iniciar';
    timeOutput.textContent = '00:00';
    timeOutput.className = '';
    setStatus('', 'Pronto para iniciar');
    inpMin.value = 5;
    inpSec.value = 0;
    sandTop.setAttribute('points', '20,30 140,30 80,108');
    sandBot.setAttribute('points', '80,190 20,190 140,190');
    sandTop.style.fill = '#D4A96A';
    sandBot.style.fill = '#D4A96A';
  }

  btnStart.addEventListener('click', () => {
    if (running) {
      pauseTimer();
    } else {
      startTimer();
    }
  });

  btnReset.addEventListener('click', resetTimer);

  document.querySelectorAll('.preset-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      if (running) return;
      inpMin.value = btn.dataset.min;
      inpSec.value = btn.dataset.sec;
      paused = false;
    });
  });

  inpMin.addEventListener('change', () => {
    if (parseInt(inpMin.value) < 0) inpMin.value = 0;
    if (parseInt(inpMin.value) > 99) inpMin.value = 99;
    if (!running) { paused = false; }
  });

  inpSec.addEventListener('change', () => {
    if (parseInt(inpSec.value) < 0) inpSec.value = 0;
    if (parseInt(inpSec.value) > 59) inpSec.value = 59;
    if (!running) { paused = false; }
  });
</script>
